@if (layoutService.isSidebarOpenMobile()) {
  <div class="mobile-overlay" (click)="layoutService.closeSidebarMobile()"></div>
}

<app-sidebar [class.sidebar-mobile-open]="layoutService.isSidebarOpenMobile()" 
             [class.sidebar-desktop-collapsed]="layoutService.isSidebarCollapsedDesktop()" />

<main class="main-content" [class.main-desktop-collapsed]="layoutService.isSidebarCollapsedDesktop()">
  <div class="mobile-header">
    <div class="brand-text">
      <span class="brand-name">Biblioteca</span>
    </div>
    <button class="btn btn-ghost btn-icon" (click)="layoutService.toggleSidebarMobile()">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="12" x2="21" y2="12"></line>
        <line x1="3" y1="6" x2="21" y2="6"></line>
        <line x1="3" y1="18" x2="21" y2="18"></line>
      </svg>
    </button>
  </div>
  
  <router-outlet />
</main>
