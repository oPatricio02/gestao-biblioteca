<div class="modal-overlay" (click)="onOverlayClick($event)">
  <div class="modal-content">
    <div class="modal-header">
      <h2>{{ isEditing ? 'Editar Usuário' : 'Novo Usuário' }}</h2>
      <button class="btn btn-ghost btn-icon" (click)="closed.emit()" id="btn-close-form">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 6 6 18"/>
          <path d="m6 6 12 12"/>
        </svg>
      </button>
    </div>

    @if (errorMessage()) {
      <div class="form-alert">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 8v4"/>
          <path d="M12 16h.01"/>
        </svg>
        {{ errorMessage() }}
      </div>
    }

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label" for="nome">Nome *</label>
          <input
            type="text"
            id="nome"
            class="form-control"
            [class.is-invalid]="isInvalid('nome')"
            formControlName="nome"
            placeholder="Nome completo"
          />
          @if (isInvalid('nome')) {
            <span class="form-error">Nome é obrigatório (mínimo 2 caracteres)</span>
          }
        </div>

        <div class="form-group">
          <label class="form-label" for="email">E-mail *</label>
          <input
            type="email"
            id="email"
            class="form-control"
            [class.is-invalid]="isInvalid('email')"
            formControlName="email"
            placeholder="usuario@email.com"
          />
          @if (isInvalid('email')) {
            <span class="form-error">Informe um e-mail válido</span>
          }
        </div>

        <div class="form-group">
          <label class="form-label" for="telefone">Telefone *</label>
          <input
            type="text"
            id="telefone"
            class="form-control"
            [class.is-invalid]="isInvalid('telefone')"
            formControlName="telefone"
            placeholder="(00) 00000-0000"
          />
          @if (isInvalid('telefone')) {
            <span class="form-error">Telefone é obrigatório (mínimo 8 dígitos)</span>
          }
        </div>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" (click)="closed.emit()" id="btn-cancel-form">
          Cancelar
        </button>
        <button
          type="submit"
          class="btn btn-primary"
          [disabled]="submitting()"
          id="btn-submit-form"
        >
          @if (submitting()) {
            <div class="spinner" style="width:16px; height:16px; border-width:2px;"></div>
            Salvando...
          } @else {
            {{ isEditing ? 'Salvar Alterações' : 'Criar Usuário' }}
          }
        </button>
      </div>
    </form>
  </div>
</div>
